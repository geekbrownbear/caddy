networks:
  # All app stacks that want Caddy to proxy them must join this network.
  # Declare it as `external: true` in each app stack's compose file.
  caddy_proxy:
    name: caddy_proxy

volumes:
  caddy_data:
  caddy_config:

services:
  caddy:
    build:
      context: .
      dockerfile: Dockerfile
    image: caddy-docker-proxy-cloudflare:local
    container_name: caddy-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3 QUIC
    volumes:
      # Read-only Docker socket — caddy-docker-proxy watches container events
      # to auto-discover routes from labels.
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      ACME_EMAIL: ${ACME_EMAIL}
      CF_API_TOKEN: ${CF_API_TOKEN:?set CF_API_TOKEN in .env - Cloudflare token scoped to Zone:DNS:Edit on bearium.net}
      # Only discover containers on the caddy_proxy network — prevents
      # accidentally picking up unrelated containers on other networks.
      CADDY_INGRESS_NETWORKS: caddy_proxy
      # REQUIRED for the mounted Caddyfile's global options (email, acme_dns)
      # to actually be merged with the label-derived site blocks - just
      # mounting the file at the conventional path is NOT enough,
      # caddy-docker-proxy silently runs on labels alone without this var
      # (confirmed via /config/caddy/autosave.json showing no "tls" app key
      # at all in the live config despite the Caddyfile parsing correctly
      # in isolation via `caddy adapt`).
      CADDY_DOCKER_CADDYFILE_PATH: /etc/caddy/Caddyfile
    networks:
      - caddy_proxy
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE   # bind to privileged ports 80/443
    read_only: true
    tmpfs:
      - /tmp
